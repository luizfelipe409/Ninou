        { dayId: '2026-07-18', eventCount: 4, events: [{ type: 'mamadeira' }, { type: 'fralda' }, { type: 'sono' }] }

    const workspace = {

    initializeNinouAdminRuntime({
      isGlobalAppAdmin: () => true,
      getCurrentUser: () => ({ email: 'admin@ninou.app' }),
